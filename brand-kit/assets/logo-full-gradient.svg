<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="45" y1="10" x2="45" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#FB923C" />
      <stop offset="100%" stopColor="#F43F5E" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g filter="url(#shadow)">
    <path d="M45 10C27.32 10 13 24.32 13 42C13 66 45 98 45 98C45 98 77 66 77 42C77 24.32 62.68 10 45 10Z" fill="url(#logoGradient)" />
    <path d="M45 10C59.4 10 73 22 73 42C73 60.4 45 90 45 90C45 90 46.6 66 46.6 42C46.6 26 45 10 45 10Z" fill="white" fill-opacity="0.12" />
    
    <!-- Fork -->
    <g transform="translate(28, 30) scale(0.7)">
      <path d="M12 25V42H16V25C20 25 22 22 22 18V5H19V18H17V5H14V18H12V5H9V18H7V5H4V18C4 22 6 25 10 25H12Z" fill="white" />
    </g>
    <!-- Spoon -->
    <g transform="translate(50, 30) scale(0.7)">
      <ellipse cx="8" cy="14" rx="8" ry="11" fill="white" />
      <rect x="6" y="24" width="4" height="18" rx="2" fill="white" />
    </g>
  </g>

  <!-- Text with Gradient -->
  <text x="100" y="75" fill="url(#logoGradient)" style="font-family: 'Inter', sans-serif; font-weight: 900; font-size: 48px; letter-spacing: -0.05em;">Hello Foodie!</text>
</svg>
